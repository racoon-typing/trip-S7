<!DOCTYPE html>
<html class="page">
    <head>
        <meta charset="utf-8">
        <title>Тестовая страница: сортировка полетов</title>
    </head>
    <body class="page__body">
        <header class="main-header">
            <h1 class="visually-hidden">Сервис поиска полетов</h1>
        </header>
        
        <main class="main-container">
            <section class="main-container__filter filter">
                <h2 class="visually-hidden">Фильтры</h2>
                <form class="filter__form">
                    <fieldset class="filter__wrapper">
                        <ul class="filter__list">
                            <li class="filter__item item">
                                <label class="item__label">
                                    <input class="item__input" type="checkbox" name="" value="">
                                </label>
                            </li>
    
                            <li class="filter__item item">
                                <label class="item__label">
                                    <input class="item__input" type="checkbox" name="" value="">
                                </label>
                            </li>

                                    <input class="item__input" type="checkbox" name="" value="">
                                </label>
                            </li>
                        </ul>
                    </fieldset>
    
                    <fieldset class="filter__wrapper filter__wrapper--radio">
                        <ul class="filter__list filter__list--radio">
                            <li class="filter__item filter__item--radio item--radio">
                                <label class="item__label item__label--radio">
                                    <input class="item__input item__input--radio " type="radio" name="" value="">
                                </label>
                            </li>
    
                            <li class="filter__item filter__item--radio item--radio">
                                <label class="item__label item__label--radio">
                                    <input class="item__input item__input--radio " type="radio" name="" value="">
                                </label>
                            </li>
    
                            <li class="filter__item filter__item--radio item--radio">
                                <label class="item__label item__label--radio">
                                    <input class="item__input item__input--radio " type="radio" name="" value="">
                                </label>
                            </li>
                        </ul>
                    </fieldset>
    
                    <div class="filter__wrapper--range">
                        <input class="filter-range" type="range">
                    </div>

                    <div class="filter__wrapper--button">
                        <button type="button">Найти</button>
                    </div>

                </form>
            </section>

            <section class="main-container__trip trip">
                <h2 class="visually-hidden">Рейсы</h2>
                <ul class="trip__list">
                    <li class="trip__item">
                        <img class="trip__photo">

                        <dl class="trip__characteristic">
                            <dt class="trip__standard"></dt>

                        </dl>

        <footer class="main-foter">
            <h2 class="visually-hidden">Контакты</h2>
            
            <p class="main-foter__description"></p>

            <ul class="main-foter__list">
                <li class="main-foter__item">
                    <a class="main-foter__link main-foter__link--tel"></a>
                </li>
                <li class="main-foter__item">
